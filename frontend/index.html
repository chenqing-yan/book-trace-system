<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图书溯源系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f2f5; }
        
        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
        }
        .login-card {
            background: white;
            padding: 40px;
            border-radius: 16px;
            width: 400px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        .login-card h2 { text-align: center; margin-bottom: 30px; color: #1a1a2e; }
        .login-card input, .login-card select {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }
        .login-card button {
            width: 100%;
            padding: 12px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }
        .login-card button:hover { background: #2980b9; }
        .error { color: red; text-align: center; margin-top: 10px; font-size: 14px; }
        
        .app-container { display: none; }
        header { background: linear-gradient(135deg, #1a1a2e, #16213e); color: white; padding: 20px 30px; }
        .header-content { display: flex; justify-content: space-between; align-items: center; max-width: 1400px; margin: 0 auto; }
        .user-info { display: flex; gap: 15px; align-items: center; }
        .role-badge { background: rgba(255,255,255,0.2); padding: 5px 12px; border-radius: 20px; font-size: 14px; }
        .logout-btn { background: rgba(255,255,255,0.2); border: none; padding: 5px 15px; border-radius: 20px; color: white; cursor: pointer; }
        .logout-btn:hover { background: rgba(255,255,255,0.3); }
        .container { max-width: 1200px; margin: 20px auto; padding: 0 20px; }
        .card { background: white; border-radius: 12px; padding: 24px; margin-bottom: 24px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
        .card h3 { margin-bottom: 20px; border-left: 4px solid #3498db; padding-left: 12px; }
        .form-group { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 15px; align-items: center; }
        input, select { padding: 10px 14px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; flex: 1; min-width: 150px; }
        button { background: #3498db; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; transition: background 0.3s; }
        button:hover { background: #2980b9; }
        .trace-flow { background: #f8f9fa; padding: 20px; border-radius: 8px; margin-top: 20px; }
        .flow-item { padding: 12px; border-left: 3px solid #3498db; margin-bottom: 12px; background: white; border-radius: 6px; }
        .btn-sm { padding: 5px 12px; font-size: 12px; margin: 3px; }
        .btn-success { background: #27ae60; }
        .btn-success:hover { background: #219a52; }
        .btn-warning { background: #f39c12; }
        .btn-warning:hover { background: #d68910; }
        .btn-buy { background: #e74c3c; }
        .btn-buy:hover { background: #c0392b; }
        .state-badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 12px; background: #e74c3c; color: white; }
        .state-badge.on-sale { background: #27ae60; }
        .state-badge.sold { background: #95a5a6; }
        .book-card { border: 1px solid #eee; border-radius: 8px; padding: 15px; margin-bottom: 15px; display: flex; gap: 15px; align-items: center; flex-wrap: wrap; transition: box-shadow 0.3s; }
        .book-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .book-cover { width: 60px; height: 80px; object-fit: cover; border-radius: 6px; background: #f0f0f0; display: flex; align-items: center; justify-content: center; font-size: 30px; overflow: hidden; }
        .book-info { flex: 2; min-width: 200px; }
        .book-actions { display: flex; gap: 8px; flex-wrap: wrap; }
        .stats { background: #f8f9fa; padding: 15px; border-radius: 8px; font-family: monospace; white-space: pre-wrap; }
        .cover-upload { display: flex; gap: 15px; align-items: center; flex-wrap: wrap; }
        .empty-state { color: #999; font-style: italic; padding: 20px; text-align: center; }
        .debug-info { background: #fff3cd; border: 1px solid #ffc107; padding: 10px; border-radius: 6px; margin-bottom: 15px; font-size: 12px; }
    </style>
</head>
<body>
    <div id="loginPage" class="login-container">
        <div class="login-card">
            <h2> 图书溯源系统</h2>
            <select id="roleSelect" onchange="updateUsername()">
                <option value="publisher">出版社</option>
                <option value="printer">印刷厂</option>
                <option value="wholesaler">批发商</option>
                <option value="bookstore">书店</option>
                <option value="regulator">监管机构</option>
                <option value="user">普通用户</option>
            </select>
            <input type="text" id="username" placeholder="用户名">
            <input type="password" id="password" placeholder="密码" value="123">
            <button onclick="login()">登录</button>
            <div id="loginError" class="error"></div>
            <div style="margin-top: 20px; font-size: 12px; color: #999; text-align: center;">
                测试账号: 密码都是123<br>
                出版社/publisher | 印刷厂/printer | 批发商/wholesaler | 书店/bookstore | 监管机构/regulator | 普通用户/user
            </div>
        </div>
    </div>

    <div id="app" class="app-container">
        <header>
            <div class="header-content">
                <h1> 图书周期溯源系统</h1>
                <div class="user-info">
                    <span id="userName"></span>
                    <span class="role-badge" id="userRole"></span>
                    <button class="logout-btn" onclick="logout()">退出</button>
                </div>
            </div>
            <p style="margin-top: 10px; opacity: 0.8;">基于 Hyperledger Fabric 区块链</p>
        </header>
        
        <div class="container" id="dynamicContent"></div>
    </div>

    <script>
        const API_BASE = 'http://192.168.75.134:3000/api';
        
        // 封面图片本地存储管理
        let coverImages = JSON.parse(localStorage.getItem('book_covers') || '{}');
        function saveCover(isbn, coverData) { 
            coverImages[isbn] = coverData; 
            localStorage.setItem('book_covers', JSON.stringify(coverImages)); 
        }
        function getCover(isbn) { 
            return coverImages[isbn] || null; 
        }

        // 登录页面用户名自动填充
        function updateUsername() {
            document.getElementById('username').value = document.getElementById('roleSelect').value;
        }

        // 登录功能
        async function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            if (!username) { 
                document.getElementById('loginError').innerText = '请输入用户名'; 
                return; 
            }
            
            try {
                const res = await fetch(`${API_BASE}/login`, {
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                
                if (data.success) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    
                    document.getElementById('loginPage').style.display = 'none';
                    document.getElementById('app').style.display = 'block';
                    
                    const user = JSON.parse(localStorage.getItem('user'));
                    document.getElementById('userName').innerText = user.name;
                    document.getElementById('userRole').innerText = user.roleName;
                    
                    loadRoleContent();
                } else {
                    document.getElementById('loginError').innerText = data.error || '登录失败';
                }
            } catch (err) {
                console.error('登录错误:', err);
                document.getElementById('loginError').innerText = '连接服务器失败';
            }
        }

        // 退出登录
        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            document.getElementById('loginPage').style.display = 'flex';
            document.getElementById('app').style.display = 'none';
        }

        // 获取认证token
        function getToken() { 
            return localStorage.getItem('token'); 
        }

        // API调用函数
        async function fetchBooks() {
            try {
                const res = await fetch(`${API_BASE}/books`, { 
                    headers: { 'Authorization': `Bearer ${getToken()}` } 
                });
                if (!res.ok) throw new Error('获取图书列表失败');
                return await res.json();
            } catch (error) {
                console.error('获取图书失败:', error);
                return [];
            }
        }

        async function fetchStats() {
            try {
                const res = await fetch(`${API_BASE}/statistics`, { 
                    headers: { 'Authorization': `Bearer ${getToken()}` } 
                });
                return await res.json();
            } catch (error) {
                console.error('获取统计失败:', error);
                return {};
            }
        }

        async function fetchMyPurchases() {
            try {
                const res = await fetch(`${API_BASE}/my-purchases`, { 
                    headers: { 'Authorization': `Bearer ${getToken()}` } 
                });
                return await res.json();
            } catch (error) {
                console.error('获取购买记录失败:', error);
                return [];
            }
        }

        // 创建新书
        async function createBook() {
            const isbn = document.getElementById('isbn')?.value;
            const bookName = document.getElementById('bookName')?.value;
            const author = document.getElementById('author')?.value;
            const publisher = document.getElementById('publisher')?.value;
            const publishDate = document.getElementById('publishDate')?.value;
            const category = document.getElementById('category')?.value;
            const price = document.getElementById('price')?.value;
            const coverFile = document.getElementById('coverFile')?.files[0];
            
            if (!isbn || !bookName) { 
                alert('请填写ISBN和书名'); 
                return; 
            }
            
            if (coverFile) {
                const reader = new FileReader();
                reader.onload = function(e) { 
                    saveCover(isbn, e.target.result); 
                    submitBook(isbn, bookName, author, publisher, publishDate, category, price); 
                };
                reader.readAsDataURL(coverFile);
            } else {
                submitBook(isbn, bookName, author, publisher, publishDate, category, price);
            }
        }
        
        async function submitBook(isbn, bookName, author, publisher, publishDate, category, price) {
            try {
                const res = await fetch(`${API_BASE}/books`, {
                    method: 'POST', 
                    headers: { 
                        'Content-Type': 'application/json', 
                        'Authorization': `Bearer ${getToken()}` 
                    },
                    body: JSON.stringify({ isbn, bookName, author, publisher, publishDate, category, price })
                });
                const result = await res.json();
                if (result.success) {
                    alert('✅ 创建成功');
                    await loadRoleContent();
                } else {
                    alert('❌ 失败: ' + result.error);
                }
            } catch (error) {
                alert('❌ 创建失败: ' + error.message);
            }
        }

        // 通用状态更新函数
        async function updateState(isbn, newState, remark) {
            try {
                console.log(`🔄 更新图书 ${isbn} 状态为: ${newState}`);
                const res = await fetch(`${API_BASE}/books/${isbn}/state`, {
                    method: 'PUT', 
                    headers: { 
                        'Content-Type': 'application/json', 
                        'Authorization': `Bearer ${getToken()}` 
                    },
                    body: JSON.stringify({ newState, remark })
                });
                const result = await res.json();
                if (result.success) {
                    console.log('✅ 状态更新成功');
                    // 延迟刷新确保区块链状态同步
                    setTimeout(async () => {
                        await loadRoleContent();
                    }, 800);
                    return true;
                } else {
                    alert('❌ 更新失败: ' + result.error);
                    return false;
                }
            } catch (error) {
                alert('❌ 操作失败: ' + error.message);
                return false;
            }
        }

        // 印刷厂：印刷并出厂
        async function finishPrint(isbn) {
            if (confirm('确认印刷完成并出厂？')) {
                await updateState(isbn, '印刷完成', '印刷厂完成印刷');
                setTimeout(async () => {
                    await updateState(isbn, '出厂分发', '印刷厂出厂分发');
                }, 1000);
            }
        }

        // 批发商：入库并配送
        async function warehouseAndDistribute(isbn) {
            if (confirm('确认入库并配送到门店？')) {
                await updateState(isbn, '批发商入库', '批发商确认入库');
                setTimeout(async () => {
                    await updateState(isbn, '配送到门店', '批发商配送到门店');
                }, 1000);
            }
        }

        // 书店：上架操作
        async function shelfBook(isbn) {
            if (confirm('确认将这本书上架销售？')) {
                console.log(`📚 书店上架图书: ${isbn}`);
                const success = await updateState(isbn, '书店上架', '书店已上架，可供销售');
                if (success) {
                    console.log('✅ 上架成功，刷新页面');
                }
            }
        }

        // 书店：售出操作
        async function sellBook(isbn) {
            if (confirm('确认售出这本书？')) {
                console.log(`💵 书店售出图书: ${isbn}`);
                const success = await updateState(isbn, '已售出', '书店已售出');
                if (success) {
                    console.log('✅ 售出成功，刷新页面');
                }
            }
        }

        // 用户：购买图书
        async function buyBook(isbn) {
            if (confirm('确认购买这本书？')) {
                try {
                    const res = await fetch(`${API_BASE}/books/${isbn}/buy`, { 
                        method: 'POST', 
                        headers: { 'Authorization': `Bearer ${getToken()}` } 
                    });
                    const result = await res.json();
                    if (result.success) {
                        alert('✅ 购买成功！');
                        await loadRoleContent();
                    } else {
                        alert('❌ ' + result.error);
                    }
                } catch (error) {
                    alert('❌ 购买失败: ' + error.message);
                }
            }
        }

        // 溯源查询
        async function traceBook(isbn) {
            try {
                const res = await fetch(`${API_BASE}/books/${isbn}`, { 
                    headers: { 'Authorization': `Bearer ${getToken()}` } 
                });
                const book = await res.json();
                
                let html = `<div class="trace-flow">
                    <h4>📘 ${book.bookName}</h4>
                    <p><strong>ISBN:</strong> ${book.isbn} | <strong>作者:</strong> ${book.author} | <strong>出版社:</strong> ${book.publisher} | <strong>价格:</strong> ¥${book.price}</p>
                    <p><strong>当前状态:</strong> <span class="state-badge">${book.currentState}</span></p>
                    <h5>📜 流转历史</h5>`;
                
                if (book.flowHistory && book.flowHistory.length > 0) {
                    book.flowHistory.forEach(flow => {
                        html += `<div class="flow-item">
                            <strong>${flow.state}</strong> | ${flow.orgName} | ${flow.optTime}<br>
                            <small>${flow.remark}</small>
                        </div>`;
                    });
                } else {
                    html += '<p>暂无流转记录</p>';
                }
                
                html += `<br><button onclick="this.parentElement.style.display='none'" style="margin-top:10px;">关闭</button></div>`;
                
                let traceDiv = document.getElementById('globalTraceResult');
                if (!traceDiv) { 
                    traceDiv = document.createElement('div'); 
                    traceDiv.id = 'globalTraceResult'; 
                    traceDiv.className = 'card'; 
                    const dynamicContent = document.getElementById('dynamicContent');
                    dynamicContent.insertBefore(traceDiv, dynamicContent.firstChild); 
                }
                traceDiv.innerHTML = html;
                traceDiv.style.display = 'block';
                traceDiv.scrollIntoView({ behavior: 'smooth' });
            } catch (error) {
                alert('❌ 溯源查询失败: ' + error.message);
            }
        }

        // 渲染图书列表
        function renderBookList(books, buttonRenderer, readonly = false) {
            if (!books || books.length === 0) {
                return '<p class="empty-state">暂无数据</p>';
            }
            
            return books.map(book => {
                const cover = getCover(book.isbn);
                let stateClass = '';
                if (book.currentState === '书店上架') stateClass = 'on-sale';
                if (book.currentState === '已售出') stateClass = 'sold';
                
                return `<div class="book-card">
                    <div class="book-cover">
                        ${cover ? `<img src="${cover}" style="width:60px;height:80px;object-fit:cover">` : '📖'}
                    </div>
                    <div class="book-info">
                        <strong>${book.bookName}</strong><br>
                        <small>ISBN: ${book.isbn} | 作者: ${book.author} | 价格: ¥${book.price}</small><br>
                        <small>状态: <span class="state-badge ${stateClass}">${book.currentState}</span></small>
                    </div>
                    <div class="book-actions">
                        <button class="btn-sm" onclick="traceBook('${book.isbn}')">🔍 溯源</button>
                        ${!readonly && buttonRenderer ? buttonRenderer(book) : ''}
                    </div>
                </div>`;
            }).join('');
        }

        // 根据角色加载对应内容
        async function loadRoleContent() {
            const user = JSON.parse(localStorage.getItem('user'));
            const container = document.getElementById('dynamicContent');
            
            if (!user) {
                logout();
                return;
            }
            
            try {
                const books = await fetchBooks();
                
                if (user.role === 'publisher') {
                    // 出版社界面
                    container.innerHTML = `
                        <div class="card" id="globalTraceResult" style="display:none;"></div>
                        <div class="card">
                            <h3>📖 录入新书</h3>
                            <div class="form-group">
                                <input type="text" id="isbn" placeholder="ISBN*">
                                <input type="text" id="bookName" placeholder="书名*">
                                <input type="text" id="author" placeholder="作者*">
                                <input type="text" id="publisher" placeholder="出版社*">
                            </div>
                            <div class="form-group">
                                <input type="date" id="publishDate">
                                <input type="text" id="category" placeholder="分类">
                                <input type="text" id="price" placeholder="价格">
                                <input type="file" id="coverFile" accept="image/*">
                            </div>
                            <button class="btn-success" onclick="createBook()">📤 提交上链</button>
                        </div>
                        <div class="card">
                            <h3>📚 所有图书 (${books.length}本)</h3>
                            ${renderBookList(books, null, true)}
                        </div>`;
                }
                else if (user.role === 'printer') {
                    // 印刷厂界面
                    const pending = books.filter(b => b.currentState === '图书信息已录入');
                    const processing = books.filter(b => 
                        b.currentState === '印刷完成' || b.currentState === '出厂分发'
                    );
                    
                    container.innerHTML = `
                        <div class="card" id="globalTraceResult" style="display:none;"></div>
                        <div class="card">
                            <h3>🖨️ 待印刷 (${pending.length}本)</h3>
                            ${renderBookList(pending, (book) => 
                                `<button class="btn-sm btn-success" onclick="finishPrint('${book.isbn}')">✅ 印刷并出厂</button>`
                            )}
                        </div>
                        <div class="card">
                            <h3>📋 处理中 (${processing.length}本)</h3>
                            ${renderBookList(processing, null, true)}
                        </div>`;
                }
                else if (user.role === 'wholesaler') {
                    // 批发商界面
                    const toProcess = books.filter(b => b.currentState === '出厂分发');
                    const processed = books.filter(b => 
                        b.currentState === '批发商入库' || b.currentState === '配送到门店'
                    );
                    
                    container.innerHTML = `
                        <div class="card" id="globalTraceResult" style="display:none;"></div>
                        <div class="card">
                            <h3>📦 待处理 (${toProcess.length}本)</h3>
                            ${renderBookList(toProcess, (book) => 
                                `<button class="btn-sm btn-success" onclick="warehouseAndDistribute('${book.isbn}')">📥 入库并配送</button>`
                            )}
                        </div>
                        <div class="card">
                            <h3>📋 已处理 (${processed.length}本)</h3>
                            ${renderBookList(processed, null, true)}
                        </div>`;
                }
                else if (user.role === 'bookstore') {
                    // 书店界面 - 修复数据同步问题
                    const freshBooks = await fetchBooks(); // 重新获取最新数据
                    
                    // 调试日志
                    console.group('🏪 书店数据状态检查');
                    console.log('所有图书:', freshBooks.map(b => ({isbn: b.isbn, name: b.bookName, state: b.currentState})));
                    
                    const toShelf = freshBooks.filter(b => b.currentState === '配送到门店');
                    const onSale = freshBooks.filter(b => b.currentState === '书店上架');
                    const sold = freshBooks.filter(b => b.currentState === '已售出');
                    
                    console.log('待上架:', toShelf.map(b => b.bookName));
                    console.log('在售中:', onSale.map(b => b.bookName));
                    console.log('已售出:', sold.map(b => b.bookName));
                    console.groupEnd();
                    
                    container.innerHTML = `
                        <div class="card" id="globalTraceResult" style="display:none;"></div>
                        
                        <!-- 调试信息 -->
                        <div class="debug-info" style="margin-bottom:15px;">
                            <strong>📊 数据统计:</strong> 
                            待上架: ${toShelf.length}本 | 
                            在售中: ${onSale.length}本 | 
                            已售出: ${sold.length}本
                            <button class="btn-sm" onclick="loadRoleContent()" style="margin-left:10px;">🔄 刷新</button>
                        </div>
                        
                        <div class="card">
                            <h3>🏪 待上架 (${toShelf.length}本)</h3>
                            ${renderBookList(toShelf, (book) => 
                                `<button class="btn-sm btn-success" onclick="shelfBook('${book.isbn}')">📚 上架</button>`
                            )}
                            ${toShelf.length === 0 ? '<p class="empty-state">暂无待上架图书，请等待批发商配送</p>' : ''}
                        </div>
                        
                        <div class="card">
                            <h3>💰 在售中 (${onSale.length}本)</h3>
                            ${renderBookList(onSale, (book) => 
                                `<button class="btn-sm btn-buy" onclick="sellBook('${book.isbn}')">💵 售出</button>`
                            )}
                            ${onSale.length === 0 ? '<p class="empty-state">暂无在售图书，请从"待上架"中上架图书</p>' : ''}
                        </div>
                        
                        <div class="card">
                            <h3>✅ 已售出 (${sold.length}本)</h3>
                            ${renderBookList(sold, null, true)}
                            ${sold.length === 0 ? '<p class="empty-state">暂无已售出图书</p>' : ''}
                        </div>`;
                }
                else if (user.role === 'regulator') {
                    // 监管机构界面
                    const stats = await fetchStats();
                    container.innerHTML = `
                        <div class="card" id="globalTraceResult" style="display:none;"></div>
                        <div class="card">
                            <h3>📊 统计数据</h3>
                            <pre class="stats">${JSON.stringify(stats, null, 2)}</pre>
                        </div>
                        <div class="card">
                            <h3>📚 全部图书 (${books.length}本)</h3>
                            ${renderBookList(books, null, true)}
                        </div>`;
                }
                else if (user.role === 'user') {
                    // 普通用户界面
                    const onSale = books.filter(b => b.currentState === '书店上架');
                    const purchases = await fetchMyPurchases();
                    
                    container.innerHTML = `
                        <div class="card" id="globalTraceResult" style="display:none;"></div>
                        <div class="card">
                            <h3>🛒 在售图书 (${onSale.length}本)</h3>
                            ${renderBookList(onSale, (book) => 
                                `<button class="btn-sm btn-buy" onclick="buyBook('${book.isbn}')">🛒 购买</button>`
                            )}
                            ${onSale.length === 0 ? '<p class="empty-state">暂无在售图书</p>' : ''}
                        </div>
                        <div class="card">
                            <h3>📖 我的书架 (${purchases.length}本)</h3>
                            ${purchases.length > 0 ? purchases.map(p => `
                                <div class="book-card">
                                    <div class="book-cover">
                                        ${getCover(p.isbn) ? `<img src="${getCover(p.isbn)}" style="width:60px;height:80px;object-fit:cover">` : '📖'}
                                    </div>
                                    <div class="book-info">
                                        <strong>${p.bookName}</strong><br>
                                        <small>ISBN: ${p.isbn} | 价格: ¥${p.price}</small><br>
                                        <small>购买时间: ${new Date(p.buyTime).toLocaleString()}</small>
                                    </div>
                                    <button class="btn-sm" onclick="traceBook('${p.isbn}')">🔍 溯源</button>
                                </div>
                            `).join('') : '<p class="empty-state">暂无购买记录</p>'}
                        </div>`;
                }
                
            } catch (error) {
                console.error('加载角色内容失败:', error);
                container.innerHTML = `<div class="card"><p>加载失败: ${error.message}</p><button onclick="loadRoleContent()">重试</button></div>`;
            }
        }

        // 初始化
        updateUsername();
        
        // 如果已登录，直接显示主界面
        if (localStorage.getItem('token')) {
            document.getElementById('loginPage').style.display = 'none';
            document.getElementById('app').style.display = 'block';
            const user = JSON.parse(localStorage.getItem('user'));
            if (user) {
                document.getElementById('userName').innerText = user.name;
                document.getElementById('userRole').innerText = user.roleName;
                loadRoleContent();
            }
        }

        // 定时刷新书店数据（可选）
        setInterval(() => {
            const user = JSON.parse(localStorage.getItem('user'));
            if (user && user.role === 'bookstore' && document.getElementById('app').style.display === 'block') {
                console.log('🔄 自动刷新书店数据...');
                loadRoleContent();
            }
        }, 30000); // 每30秒自动刷新一次
    </script>
</body>
</html>
